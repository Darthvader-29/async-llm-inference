# alembic.ini — Alembic configuration.
# sqlalchemy.url is intentionally EMPTY: env.py loads it from Settings()
# (so the URL/secret lives only in the environment, never in this file).
[alembic]
script_location = migrations
prepend_sys_path = .
# Use OS-native path separators for version files (Windows-friendly).
version_path_separator = os
# file template: zero-padded sequence + slug -> sortable, readable filenames.
# e.g. 0001_create_jobs_table.py
file_template = %%(rev)s_%%(slug)s

sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
